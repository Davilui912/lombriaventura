name: lombriaventura
description: App educativa infantil de lombricomposta
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:

  #base de datos
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  #rerpoductor de video
  video_player: ^2.8.3
  flutter:
    sdk: flutter

  # UI y Animaciones
  cupertino_icons: ^1.0.8
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  
  # Almacenamiento Local
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Juegos
  flame: ^1.20.0
  
  # Cámara y Galería
  image_picker: ^1.1.2
  
  # Voz (Chat IA y Diario)
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  
  # Conectividad y API
  http: ^1.6.0
  connectivity_plus: ^6.1.0
  
  # Utilidades
  path_provider: ^2.1.4
  share_plus: ^10.1.2
  screenshot: ^3.0.0
  intl: ^0.19.0
  google_fonts: ^8.1.0
  google_generative_ai: ^0.4.7
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_lombriaventura.png"
  adaptive_icon_background: "#7AC943"
  adaptive_icon_foreground: "assets/images/logo_lombriaventura.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/personajes/
    - assets/images/accesorios/
    - assets/images/memorama/
    - assets/videos/anuncio.mp4
    - assets/animations/
    - assets/images/icons/
    - assets/audio/
    - assets/data/
